name: Build All-in-One-MPV
defaults:
  run:
    shell: bash
on:
  workflow_dispatch:
    inputs:
      compiler:
        description: "Compiler"
        required: false
        default: "clang-static"
        type: choice
        options:
        - gcc-mcf
        - gcc-win32
        - clang-static
        - clang-llvm-mingw      
      build_target:
        description: "Build target"
        required: false
        default: "x86_64_v3"
        type: choice
        options:
        - x86_64
        - x86_64_v3

  #schedule:
  #- cron: '30 0 * * MON'

jobs:
  brotli:
    runs-on: ubuntu-latest
    env:
      COMPILER: ${{ inputs.compiler }}
      BIT: ${{ inputs.build_target }}
      GH_TOKEN: ${{ secrets.BOT }} 
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@main      
      - name: Add builder user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          install -m644 pacman-config/makepkg_cross_${COMPILER%%-*}.conf /etc/
          install -m755 pacman-config/makepkg-cross-${COMPILER%%-*} /usr/bin/
      - name: Setting top_dir env
        run: echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Loading ${{ inputs.compiler }}-${{ inputs.build_target }} cache
        uses: actions/cache@main
        with:
          path: ${{ env.top_dir }}/cross
          key: ${{ inputs.compiler }}-${{ inputs.build_target }}
      - name: Build
        run: |
          sudo chmod 777 -R ${{ env.top_dir }} .
          cd brotli-dev; sudo -H -E -u builder makepkg-cross-${COMPILER%%-*}
      - name: Release
        run: ./release-dev.sh brotli-dev brotli-dev

